<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Фигурное катание — калькулятор</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: white;
            color: #1a2a3a;
            padding: 16px;
            padding-bottom: 40px;
        }
        .main-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
        }
        .main-screen h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a2a3a;
        }
        .main-screen p {
            font-size: 16px;
            color: #5a6a7a;
            margin-bottom: 20px;
        }
        .btn-blue {
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 16px 48px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(74, 144, 217, 0.3);
            transition: 0.2s;
            width: 100%;
            max-width: 300px;
            touch-action: manipulation;
            margin: 6px 0;
        }
        .btn-blue:active { opacity: 0.7; }
        .btn-blue-small {
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            margin-top: 10px;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #4a90d9;
            color: #4a90d9;
            border-radius: 30px;
            padding: 12px 32px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            margin: 4px 0;
            width: 100%;
            max-width: 300px;
        }
        .form-screen { display: none; }
        .active { display: block; }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2a4a6a;
        }
        .form-group select, .form-group input {
            width: 100%;
            padding: 14px 12px;
            border: 2px solid #c0d8f0;
            border-radius: 12px;
            font-size: 16px;
            background: white;
            color: #1a2a3a;
            appearance: none;
            -webkit-appearance: none;
        }
        .form-group select:focus, .form-group input:focus {
            border-color: #4a90d9;
            outline: none;
        }
        .section-header {
            background: #e6f0fa;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 18px;
            color: #1a3a5a;
            margin: 24px 0 16px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 300px;
        }
        th {
            background: #4a90d9;
            color: white;
            padding: 10px 6px;
            text-align: center;
            font-weight: 600;
        }
        td {
            padding: 6px 4px;
            border-bottom: 1px solid #dce8f2;
            text-align: center;
        }
        tr:nth-child(even) { background: #f4f9ff; }
        .element-select {
            background: white;
            border: 1px solid #c0d8f0;
            border-radius: 8px;
            padding: 8px 4px;
            font-size: 13px;
            width: 100%;
            min-width: 70px;
        }
        .element-select:focus { border-color: #4a90d9; outline: none; }
        .input-goe {
            width: 100%;
            padding: 8px 4px;
            border: 1px solid #c0d8f0;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
        }
        .input-goe:focus { border-color: #4a90d9; outline: none; }
        .cascade-select {
            background: white;
            border: 1px solid #c0d8f0;
            border-radius: 8px;
            padding: 4px;
            font-size: 12px;
            width: 100%;
            min-width: 50px;
        }
        .cascade-select:focus { border-color: #4a90d9; outline: none; }
        .add-row-btn {
            background: #e6f0fa;
            border: 2px dashed #4a90d9;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            color: #4a90d9;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            margin: 8px 0 16px 0;
        }
        .penalty-group {
            background: #f4f9ff;
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
        }
        .penalty-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 400;
            margin-bottom: 8px;
        }
        .penalty-group input[type="number"] {
            width: 60px;
            padding: 6px;
            border: 1px solid #c0d8f0;
            border-radius: 8px;
            text-align: center;
        }
        .total-block {
            background: #4a90d9;
            color: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-top: 24px;
            font-size: 22px;
            font-weight: 700;
        }
        .total-block small {
            font-weight: 400;
            font-size: 14px;
            opacity: 0.9;
        }
        .back-btn {
            background: transparent;
            border: none;
            color: #4a90d9;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 0;
            touch-action: manipulation;
        }
        .hidden { display: none; }
        .inline-flex { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .inline-flex label { font-weight: 400; margin: 0; }
        .inline-flex input[type="number"] { width: 60px; }
        .warning { color: #c0392b; font-size: 13px; margin-top: 4px; }
        .history-item {
            background: #f4f9ff;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-left: 4px solid #4a90d9;
        }
        .history-item .title {
            font-weight: 700;
            font-size: 16px;
            color: #1a3a5a;
        }
        .history-item .meta {
            font-size: 14px;
            color: #4a6a8a;
            margin: 4px 0;
        }
        .history-item .score {
            font-size: 18px;
            font-weight: 700;
            color: #4a90d9;
        }
        .history-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .history-actions button {
            background: #e6f0fa;
            border: none;
            border-radius: 16px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            touch-action: manipulation;
            color: #1a3a5a;
        }
        .history-actions button.delete {background: #fee;
            color: #c0392b;
        }
        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        .btn-row .btn-blue {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            font-size: 16px;
        }
        .pcs-section {
            background: #eef6fe;
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
        }
        .pcs-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .pcs-row label {
            min-width: 60px;
            font-weight: 600;
            color: #1a3a5a;
        }
        .pcs-row select {
            flex: 1;
            min-width: 80px;
            padding: 8px;
            border: 1px solid #c0d8f0;
            border-radius: 8px;
            font-size: 14px;
        }
        max-width: 480px {
            body { padding: 10px; }
            th, td { font-size: 12px; padding: 4px 2px; }
            .element-select { font-size: 12px; min-width: 60px; }
            .input-goe { font-size: 12px; }
        }
    </style>
</head>
<body>

<!-- ГЛАВНЫЙ ЭКРАН -->
<div id="mainScreen" class="main-screen">
    <h1>⛸️ Фигурное катание</h1>
    <p>Калькулятор очков</p>
    <button class="btn-blue" onclick="startApp()">Начать</button>
    <button class="btn-outline" onclick="showHistory()">📋 Мои программы</button>
</div>

<!-- ФОРМА ДАННЫХ -->
<div id="formScreen" class="form-screen">
    <div class="form-group">
        <label>Тип программы</label>
        <select id="programType">
            <option value="парное">Парное катание</option>
            <option value="мужское">Мужское одиночное</option>
            <option value="женское">Женское одиночное</option>
            <option value="танцы">Танцы на льду</option>
        </select>
    </div>
    <div class="form-group">
        <label>Возрастная категория</label>
        <select id="ageCategory">
            <option value="взрослые">Взрослые</option>
            <option value="юниоры">Юниоры</option>
            <option value="дети">Дети</option>
        </select>
    </div>
    <div class="form-group">
        <label>Пол</label>
        <select id="gender">
            <option value="мужской">Мужской</option>
            <option value="женский">Женский</option>
        </select>
    </div>
    <div class="form-group">
        <label>ФИО фигуриста</label>
        <input type="text" id="skaterName" placeholder="Имя Фамилия">
    </div>
    <div class="form-group">
        <label>Страна</label>
        <select id="country">
            <option value="Россия">Россия</option>
            <option value="США">США</option>
            <option value="Канада">Канада</option>
            <option value="Япония">Япония</option>
            <option value="Китай">Китай</option>
            <option value="Италия">Италия</option>
            <option value="Франция">Франция</option>
            <option value="Германия">Германия</option>
            <option value="Корея">Корея</option>
            <option value="Казахстан">Казахстан</option>
            <option value="Украина">Украина</option>
            <option value="Беларусь">Беларусь</option>
            <option value="Грузия">Грузия</option>
            <option value="Израиль">Израиль</option>
            <option value="Швейцария">Швейцария</option>
            <option value="Швеция">Швеция</option>
            <option value="Финляндия">Финляндия</option>
            <option value="Великобритания">Великобритания</option>
            <option value="Латвия">Латвия</option>
            <option value="Эстония">Эстония</option>
            <option value="Чехия">Чехия</option>
            <option value="Словакия">Словакия</option>
            <option value="Венгрия">Венгрия</option>
            <option value="Польша">Польша</option>
            <option value="Румыния">Румыния</option>
            <option value="Болгария">Болгария</option>
            <option value="Испания">Испания</option>
            <option value="Нидерланды">Нидерланды</option>
            <option value="Бельгия">Бельгия</option>
            <option value="Норвегия">Норвегия</option>
            <option value="Дания">Дания</option>
            <option value="Литва">Литва</option>
            <option value="Азербайджан">Азербайджан</option>
            <option value="Армения">Армения</option>
            <option value="Таджикистан">Таджикистан</option>
            <option value="Узбекистан">Узбекистан</option>
            <option value="Монголия">Монголия</option>
            <option value="Турция">Турция</option>
            <option value="Другое">Другое</option>
        </select>
    </div>
    <div class="form-group">
        <label>Тренер(ы)</label>
        <input type="text" id="coaches" placeholder="Фамилия Имя">
    </div>
    <div class="form-group">
        <label>Музыка</label>
        <input type="text" id="music" placeholder="Название / Композитор">
    </div>
    <div class="form-group">
        <label>Программа</label>
        <select id="programLength">
            <option value="короткая">Короткая программа</option>
            <option value="произвольная">Произвольная программа</option>
        </select>
    </div>

    <button class="btn-blue" onclick="goToElements()" style="margin-top:8px;">Далее →</button>
</div>

<!-- ЭКРАН ЭЛЕМЕНТОВ -->
<div id="elementsScreen" class="form-screen">
    <!-- ПРЫЖКИ -->
    <div class="section-header">
        <span>Прыжки</span>
        <button class="btn-blue-small" onclick="addJumpRow()">+ Одиночный</button>
        <button class="btn-blue-small" onclick="addCascadeRow()">+ Каскад</button>
    </div>
    <div class="table-wrap">
        <table id="jumpTable">
            <thead>
                <tr>
                    <th style="width:45%;">Прыжок / Каскад</th>
                    <th style="width:25%;">База</th>
                    <th style="width:30%;">GOE</th>
                </tr>
            </thead>
            <tbody id="jumpBody">
                <!-- Строки добавляются через JS -->
            </tbody>
        </table>
    </div>

    <!-- ВРАЩЕНИЯ -->
    <div class="section-header">
        <span>Вращения</span>
        <button class="btn-blue-small" onclick="addSpinRow()">+ Добавить</button>
    </div>
    <div class="table-wrap">
        <table id="spinTable">
            <thead>
                <tr>
                    <th style="width:45%;">Вращение</th>
                    <th style="width:25%;">База</th>
                    <th style="width:30%;">GOE</th>
                </tr>
            </thead>
            <tbody id="spinBody"></tbody>
        </table>
    </div>

    <!-- ДОРОЖКИ ШАГОВ -->
    <div class="section-header">
        <span>Дорожки шагов</span>
        <button class="btn-blue-small" onclick="addStepRow()">+ Добавить</button>
    </div>
    <div class="table-wrap">
        <table id="stepTable">
            <thead>
                <tr>
                    <th style="width:45%;">Дорожка</th>
                    <th style="width:25%;">База</th>
                    <th style="width:30%;">GOE</th>
                </tr>
            </thead>
            <tbody id="stepBody"></tbody>
        </table>
    </div>

    <!-- ХОРЕО ДОРОЖКИ -->
    <div class="section-header">
        <span>Хорео дорожки</span>
        <button class="btn-blue-small" onclick="addChoreoRow()">+ Добавить</button>
    </div>
    <div class="table-wrap">
        <table id="choreoTable">
            <thead>
                <tr>
                    <th style="width:45%;">Хорео</th>
                    <th style="width:25%;">База</th>
                    <th style="width:30%;">GOE</th>
                </tr>
            </thead>
            <tbody id="choreoBody"></tbody>
        </table>
    </div>

    <!--PCS (КОМПОНЕНТЫ) -->
    <div class="section-header" style="margin-top:16px;">Компоненты программы (PCS)</div>
    <div class="pcs-section">
        <div class="pcs-row">
            <label>SS</label>
            <select id="pcs_ss">
                <option value="0.25">0.25</option>
                <option value="0.50">0.50</option>
                <option value="0.75">0.75</option>
                <option value="1.00" selected>1.00</option>

        <div class="pcs-row">

                <option value="3.50">3.50</option>
                <option value="3.75">3.75</option>
                <option value="4.00">4.00</option>

                <option value="4.50">4.50</option>

                <option value="7.00">7.00</option>
                <option value="7.25">7.25</option>

                <option value="7.75">7.75</option>
                <option value="8.00">8.00</option>

        </div>
        <div class="pcs-row">
            <label>IN</label>
            <select id="pcs_in">
                <option value="0.25">0.25</option>
                <option value="0.50">0.50</option>
                <option value="0.75">0.75</option>
                <option value="1.00" selected>1.00</option>
                <option value="1.25">1.25</option>
                <option value="1.50">1.50</option>
                <option value="1.75">1.75</option>
                <option value="2.00">2.00</option>

    <!-- ШТРАФЫ -->
    <div class="section-header" style="margin-top:8px;">Штрафы</div>
    <div class="penalty-group">
        <label>
            <input type="checkbox" id="penaltyFall"> Падение (−1.0)
        </label>
        <label>
            <input type="checkbox" id="penaltyTime"> Нарушение времени (−1.0)
        </label>
        <label>
            <input type="checkbox" id="penaltyCostume"> Костюм/реквизит (−1.0)
        </label>
        <label>
            <input type="checkbox" id="penaltyInterruption"> Прерывание (−1.0)
        </label>
        <label>
            <input type="checkbox" id="penaltyMusic"> Музыка (−1.0)
        </label>
        <div class="inline-flex" style="margin-top:8px;">
            <label>Другие штрафы:</label>
            <input type="number" id="otherPenalty" value="0" step="0.5">
        </div>
    </div>

    <!-- КНОПКИ ДЕЙСТВИЙ -->
    <div class="btn-row">
        <button class="btn-blue" onclick="calculateTotal()">Рассчитать итог</button>
        <button class="btn-blue" onclick="saveProgram()" style="background:#2a7a4a;">💾 Сохранить</button>
    </div>

    <!-- ИТОГ -->
    <div id="totalBlock" class="total-block hidden">
        <small>Общий счёт</small>

        <span id="totalScore">0.00</span>
        <div style="font-size:14px; opacity:0.8; margin-top:6px;">
            <span id="tesDisplay">TES: 0.00</span> + 
            <span id="pcsDisplay">PCS: 0.00</span> − 
            <span id="penaltyDisplay">Штрафы: 0.00</span>
        </div>
    </div>

    <button class="back-btn" onclick="goBackToForm()">← Назад к данным</button>
</div>

<!-- ЭКРАН ИСТОРИИ -->
<div id="historyScreen" class="form-screen">
    <div class="section-header">📋 Мои программы</div>
    <div id="historyList" style="min-height:100px;">
        <!-- Сюда будут загружаться сохранённые программы -->
    </div>
    <button class="btn-outline" onclick="clearHistory()" style="margin-top:12px; border-color:#c0392b; color:#c0392b;">Очистить историю</button>
    <button class="back-btn" onclick="goToMain()" style="margin-top:16px;">← На главный экран</button>
</div>

<script>
    // --- БАЗОВЫЕ ЗНАЧЕНИЯ (ISU) ---
    const jumps = {
        '1T': 0.40, '1S': 0.40, '1Lo': 0.50, '1F': 0.50, '1Lz': 0.60, '1A': 1.10,
        '2T': 1.30, '2S': 1.30, '2Lo': 1.70, '2F': 1.80, '2Lz': 2.10, '2A': 3.30,
        '3T': 4.20, '3S': 4.30, '3Lo': 4.90, '3F': 5.30, '3Lz': 5.90, '3A': 8.00,
        '4T': 9.50, '4S': 9.70, '4Lo': 10.50, '4F': 11.00, '4Lz': 11.50, '4A': 12.50
    };
    const spins = {
        'USpB': 1.00, 'SSpB': 1.00, 'CSpB': 1.00, 'LSpB': 1.00, 'CoSpB': 1.50,
        'USp1': 1.20, 'SSp1': 1.20, 'CSp1': 1.20, 'LSp1': 1.20, 'CoSp1': 1.70,
        'USp2': 1.40, 'SSp2': 1.40, 'CSp2': 1.40, 'LSp2': 1.40, 'CoSp2': 1.80,
        'USp3': 1.70, 'SSp3': 1.70, 'CSp3': 1.70, 'LSp3': 1.70, 'CoSp3': 2.10,
        'USp4': 2.00, 'SSp4': 2.00, 'CSp4': 2.00, 'LSp4': 2.00, 'CoSp4': 2.30
    };
    const steps = {
        'StSqB': 1.00, 'StSq1': 1.30, 'StSq2': 1.70, 'StSq3': 2.20, 'StSq4': 2.80
    };
    const choreo = {
        'ChSq': 1.00, 'ChSq1': 1.00, 'ChSq2': 1.00, 'ChSq3': 1.00, 'ChSq4': 1.00
    };

    // --- СОРТИРОВКА ПРЫЖКОВ ПО ВОЗРАСТАНИЮ ---
    const jumpKeys = Object.keys(jumps).sort((a,b) => {
        const numA = parseInt(a), numB = parseInt(b);
        if (numA !== numB) return numA - numB;
        return a.slice(-1) > b.slice(-1) ? 1 : -1;
    });

    // --- ПЕРЕКЛЮЧЕНИЕ ЭКРАНОВ ---
    function startApp() {
        document.getElementById('mainScreen').style.display = 'none';
        document.getElementById('formScreen').classList.add('active');
    }
    function goToElements() {
        document.getElementById('formScreen').classList.remove('active');
        document.getElementById('elementsScreen').classList.add('active');
        if (document.getElementById('jumpBody').children.length === 0) {
            for (let i=0; i<3; i++) addJumpRow();
            addCascadeRow();
            for (let i=0; i<2; i++) addSpinRow();
            for (let i=0; i<1; i++) addStepRow();
            for (let i=0; i<1; i++) addChoreoRow();
        }
    }
    function goBackToForm() {
        document.getElementById('elementsScreen').classList.remove('active');
        document.getElementById('formScreen').classList.add('active');
    }
    function goToMain() {
        document.getElementById('historyScreen').classList.remove('active');
        document.getElementById('mainScreen').style.display = 'flex';
    }
    function showHistory() {
        document.getElementById('mainScreen').style.display = 'none';
        document.getElementById('historyScreen').classList.add('active');
        renderHistory();
    }

    // --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ДЛЯ ТАБЛИЦ ---
    function createRow(tableBody, keyList, valueMap, rowType) {
        const tr = document.createElement('tr');
        const tdSelect = document.createElement('td');
        const select = document.createElement('select');
        select.className = 'element-select';
        select.dataset.type = rowType;
        keyList.forEach(k => {
            const opt = document.createElement('option');
            opt.value = k;
            opt.textContent = k;
            select.appendChild(opt);
        });
        select.value = keyList[0];
        tdSelect.appendChild(select);

        const tdBase = document.createElement('td');
        const baseSpan = document.createElement('span');
        baseSpan.className = 'base-value';
        baseSpan.textContent = valueMap[keyList[0]]?.toFixed(2) || '0.00';
        tdBase.appendChild(baseSpan);

        const tdGoe = document.createElement('td');
        const input = document.createElement('input');
        input.type = 'number';
        input.step = '0.1';
        input.min = '-5';
        input.max = '5';
        input.value = '0';
        input.className = 'input-goe';
        tdGoe.appendChild(input);

        select.addEventListener('change', () => {
            const val = valueMap[select.value] || 0;
            baseSpan.textContent = val.toFixed(2);
        });

        tr.appendChild(tdSelect);
        tr.appendChild(tdBase);
        tr.appendChild(tdGoe);
        tableBody.appendChild(tr);
    }

    function addJumpRow() {
        const body = document.getElementById('jumpBody');
        createRow(body, jumpKeys, jumps, 'jump');
    }

    // --- КАСКАДЫ ---
    function addCascadeRow() {
        const body = document.getElementById('jumpBody');
        const tr = document.createElement('tr');
        tr.className = 'cascade-row';

        const tdSelect = document.createElement('td');
        const container = document.createElement('div');
        container.style.display = 'flex';
        container.style.flexWrap = 'wrap';
        container.style.gap = '4px';
        container.style.justifyContent = 'center';

        const sel1 = document.createElement('select');
        sel1.className = 'cascade-select';
        const sel2 = document.createElement('select');
        sel2.className = 'cascade-select';
        const sel3 = document.createElement('select');
        sel3.className = 'cascade-select';

        const allJumps = ['1T','1S','1Lo','1F','1Lz','1A','2T','2S','2Lo','2F','2Lz','2A','3T','3S','3Lo','3F','3Lz','3A','4T','4S','4Lo','4F','4Lz','4A'];
        [sel1, sel2, sel3].forEach(sel => {
            const empty = document.createElement('option');
            empty.value = '';
            empty.textContent = '—';
            sel.appendChild(empty);
            allJumps.forEach(j => {
                const opt = document.createElement('option');
                opt.value = j;
                opt.textContent = j;
                sel.appendChild(opt);
            });
        });
        sel1.value = '3T';
        sel2.value = '3T';
        sel3.value = '';

        container.appendChild(sel1);
        container.appendChild(document.createTextNode('+'));
        container.appendChild(sel2);
        container.appendChild(document.createTextNode('+'));
        container.appendChild(sel3);
        tdSelect.appendChild(container);

        const tdBase = document.createElement('td');
        const baseSpan = document.createElement('span');
        baseSpan.className = 'base-value';
        baseSpan.textContent = '0.00';
        tdBase.appendChild(baseSpan);

        const tdGoe = document.createElement('td');
        const input = document.createElement('input');
        input.type = 'number';
        input.step = '0.1';
        input.min = '-5';
        input.max = '5';
        input.value = '0';
        input.className = 'input-goe';
        tdGoe.appendChild(input);

        function updateCascadeBase() {
            let total = 0;
            const v1 = jumps[sel1.value] || 0;
            const v2 = jumps[sel2.value] || 0;
            const v3 = jumps[sel3.value] || 0;
            total = v1 + v2 + v3;
            baseSpan.textContent = total.toFixed(2);
        }
        sel1.addEventListener('change', updateCascadeBase);
        sel2.addEventListener('change', updateCascadeBase);
        sel3.addEventListener('change', updateCascadeBase);
        updateCascadeBase();

        tr.appendChild(tdSelect);
        tr.appendChild(tdBase);
        tr.appendChild(tdGoe);
        body.appendChild(tr);
    }

    function addSpinRow() {
        const body = document.getElementById('spinBody');
        const keys = Object.keys(spins).sort();
        createRow(body, keys, spins, 'spin');
    }
    function addStepRow() {
        const body = document.getElementById('stepBody');
        const keys = Object.keys(steps).sort();
        createRow(body, keys, steps, 'step');
    }
    function addChoreoRow() {
        const body = document.getElementById('choreoBody');
        const keys = Object.keys(choreo).sort();
        createRow(body, keys, choreo, 'choreo');
    }

    // --- РАСЧЁТ ---
    function calculateTotal() {
        let tes = 0;

        document.querySelectorAll('#jumpBody tr:not(.cascade-row)').forEach(tr => {
            const baseSpan = tr.querySelector('.base-value');
            const goeInput = tr.querySelector('.input-goe');
            if (baseSpan && goeInput) {
                const base = parseFloat(baseSpan.textContent) || 0;
                const goe = parseFloat(goeInput.value) || 0;
                tes += base + goe;
            }
        });

        document.querySelectorAll('#jumpBody tr.cascade-row').forEach(tr => {
            const baseSpan = tr.querySelector('.base-value');
            const goeInput = tr.querySelector('.input-goe');
            if (baseSpan && goeInput) {
                const base = parseFloat(baseSpan.textContent) || 0;
                const goe = parseFloat(goeInput.value) || 0;
                tes += base + goe;
            }
        });

        document.querySelectorAll('#spinBody tr').forEach(tr => {
            const baseSpan = tr.querySelector('.base-value');
            const goeInput = tr.querySelector('.input-goe');
            if (baseSpan && goeInput) {
                const base = parseFloat(baseSpan.textContent) || 0;
                const goe = parseFloat(goeInput.value) || 0;
                tes += base + goe;
            }
        });

        document.querySelectorAll('#stepBody tr').forEach(tr => {
            const baseSpan = tr.querySelector('.base-value');
            const goeInput = tr.querySelector('.input-goe');
            if (baseSpan && goeInput) {
                const base = parseFloat(baseSpan.textContent) || 0;
                const goe = parseFloat(goeInput.value) || 0;
                tes += base + goe;
            }
        });

        document.querySelectorAll('#choreoBody tr').forEach(tr => {
            const baseSpan = tr.querySelector('.base-value');
            const goeInput = tr.querySelector('.input-goe');
            if (baseSpan && goeInput) {
                const base = parseFloat(baseSpan.textContent) || 0;
                const goe = parseFloat(goeInput.value) || 0;
                tes += base + goe;
            }
        });

        const pcs_ss = parseFloat(document.getElementById('pcs_ss').value) || 0;
        const pcs_tr = parseFloat(document.getElementById('pcs_tr').value) || 0;
        const pcs_pe = parseFloat(document.getElementById('pcs_pe').value) || 0;
        const pcs_co = parseFloat(document.getElementById('pcs_co').value) || 0;
        const pcs_in = parseFloat(document.getElementById('pcs_in').value) || 0;
        const pcs = pcs_ss + pcs_tr + pcs_pe + pcs_co + pcs_in;

        let penalties = 0;
        if (document.getElementById('penaltyFall').checked) penalties += 1.0;
        if (document.getElementById('penaltyTime').checked) penalties += 1.0;
        if (document.getElementById('penaltyCostume').checked) penalties += 1.0;
        if (document.getElementById('penaltyInterruption').checked) penalties += 1.0;
        if (document.getElementById('penaltyMusic').checked) penalties += 1.0;
        const other = parseFloat(document.getElementById('otherPenalty').value) || 0;
        penalties += other;

        const total = tes + pcs - penalties;

        const totalBlock = document.getElementById('totalBlock');
        totalBlock.classList.remove('hidden');
        document.getElementById('totalScore').textContent = total.toFixed(2);
        document.getElementById('tesDisplay').textContent = 'TES: ' + tes.toFixed(2);
        document.getElementById('pcsDisplay').textContent = 'PCS: ' + pcs.toFixed(2);
        document.getElementById('penaltyDisplay').textContent = 'Штрафы: ' + penalties.toFixed(2);
        return total;
    }

    // --- СОХРАНЕНИЕ ПРОГРАММЫ ---
    function saveProgram() {
        const total = calculateTotal();
        const name = document.getElementById('skaterName').value || 'Без имени';
        const country = document.getElementById('country').value;
        const programType = document.getElementById('programType').value;
        const programLength = document.getElementById('programLength').value;
        const date = new Date().toLocaleString('ru-RU');

        const pcs_ss = document.getElementById('pcs_ss').value;
        const pcs_tr = document.getElementById('pcs_tr').value;
        const pcs_pe = document.getElementById('pcs_pe').value;
        const pcs_co = document.getElementById('pcs_co').value;
        const pcs_in = document.getElementById('pcs_in').value;

        const program = {
            id: Date.now(),
            name: name,
            country: country,
            type: programType,
            length: programLength,
            score: total.toFixed(2),
            date: date,
            pcs: { ss: pcs_ss, tr: pcs_tr, pe: pcs_pe, co: pcs_co, in: pcs_in },
            ageCategory: document.getElementById('ageCategory').value,
            gender: document.getElementById('gender').value,
            coaches: document.getElementById('coaches').value,
            music: document.getElementById('music').value,
        };

        let history = JSON.parse(localStorage.getItem('skatingHistory') || '[]');
        history.push(program);
        localStorage.setItem('skatingHistory', JSON.stringify(history));

        alert('✅ Программа сохранена!');
    }

    // --- ОТОБРАЖЕНИЕ ИСТОРИИ ---
    function renderHistory() {
        const list = document.getElementById('historyList');
        const history = JSON.parse(localStorage.getItem('skatingHistory') || '[]');
        if (history.length === 0) {
            list.innerHTML = '<p style="color:#5a6a7a; text-align:center;">Нет сохранённых программ.</p>';
            return;
        }
        list.innerHTML = history.slice().reverse().map(p => {
            const typeLabel = { 'парное':'Парное','мужское':'Мужское','женское':'Женское','танцы':'Танцы' }[p.type] || p.type;
            const lengthLabel = { 'короткая':'Короткая','произвольная':'Произвольная' }[p.length] || p.length;
            const pcsInfo = p.pcs ? `SS:${p.pcs.ss} TR:${p.pcs.tr} PE:${p.pcs.pe} CO:${p.pcs.co} IN:${p.pcs.in}` : '';
            return `
                <div class="history-item">
                    <div class="title">${p.name}</div>
                    <div class="meta">${p.country} · ${typeLabel} · ${lengthLabel}</div>
                    <div class="meta">${p.date}</div>
                    <div class="score">${p.score} очков</div>
                    ${pcsInfo ? `<div style="font-size:13px; color:#4a6a8a;">PCS: ${pcsInfo}</div>` : ''}
                    <div class="history-actions">
                        <button onclick="viewProgram(${p.id})">📄 Просмотр</button>
                        <button class="delete" onclick="deleteProgram(${p.id})">🗑️ Удалить</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function viewProgram(id) {
        const history = JSON.parse(localStorage.getItem('skatingHistory') || '[]');
        const p = history.find(item => item.id === id);
        if (!p) return;
        const typeLabel = { 'парное':'Парное','мужское':'Мужское','женское':'Женское','танцы':'Танцы' }[p.type] || p.type;
        const lengthLabel = { 'короткая':'Короткая','произвольная':'Произвольная' }[p.length] || p.length;
        const pcsInfo = p.pcs ? `SS:${p.pcs.ss} TR:${p.pcs.tr} PE:${p.pcs.pe} CO:${p.pcs.co} IN:${p.pcs.in}` : '';
        alert(`Программа: ${p.name}\nСтрана: ${p.country}\nТип: ${typeLabel}\nПрограмма: ${lengthLabel}\nОчки: ${p.score}\nPCS: ${pcsInfo}\nДата: ${p.date}`);
    }

    function deleteProgram(id) {
        if (!confirm('Удалить программу?')) return;
        let history = JSON.parse(localStorage.getItem('skatingHistory') || '[]');
        history = history.filter(item => item.id !== id);
        localStorage.setItem('skatingHistory', JSON.stringify(history));
        renderHistory();
    }

    function clearHistory() {
        if (!confirm('Очистить всю историю?')) return;
        localStorage.removeItem('skatingHistory');
        renderHistory();
    }

    // --- ИНИЦИАЛИЗАЦИЯ ---
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('mainScreen').style.display = 'flex';
        document.getElementById('formScreen').classList.remove('active');
        document.getElementById('elementsScreen').classList.remove('active');
        document.getElementById('historyScreen').classList.remove('active');
    });
</script>
